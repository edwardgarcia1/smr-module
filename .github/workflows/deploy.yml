name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NS: ${{ github.repository_owner }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/smr-module-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}

  # ── Deploy via self-hosted runner on the server ────────────
  deploy:
    needs: build
    runs-on: [self-hosted, linux, smr]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Write docker-compose.yml
        run: |
          mkdir -p /opt/smr-module
          cat > /opt/smr-module/docker-compose.yml << 'COMPOSE'
          services:
            api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/smr-module-api:latest
              container_name: smr-api
              restart: unless-stopped
              ports:
                - "3000:3000"
              volumes:
                - smr_data:/app/data
              env_file: .env
              environment:
                NODE_ENV: production

            web:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/smr-module-web:latest
              container_name: smr-web
              restart: unless-stopped
              ports:
                - "80:80"
              depends_on:
                - api

          volumes:
            smr_data:
          COMPOSE

      - name: Write .env
        run: echo "${{ secrets.ENV_FILE }}" | base64 -d > /opt/smr-module/.env

      - name: Login to GHCR
        # GITHUB_TOKEN is auto-generated per run, expires ~60 min after workflow ends.
        # Docker caches the pulled image, so restarts work fine without re-pulling.
        run: echo "${{ github.token }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull & restart
        run: |
          cd /opt/smr-module
          docker compose pull
          docker compose up -d --remove-orphans
          docker system prune -af --filter "until=24h"
